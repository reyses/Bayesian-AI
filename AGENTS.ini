; ============================================================================
; AGENTS.ini — entry point for any AI working in this repo.
;
; Purpose: tell an unfamiliar AI agent (Claude, Jules, Cursor, Aider, GPT, …)
;   the bare minimum needed to make a useful, non-destructive change.
;
; Read order on first session:
;   1. This file (you're here).
;   2. CLAUDE.md (root)            — full persona + project rules.
;   3. docs/daily/INDEX.md         — what happened recently.
;   4. docs/memory/MEMORY.md       — durable rules + project state.
;
; Don't trust any value here as up-to-date if it conflicts with CLAUDE.md —
; CLAUDE.md wins. This file is the index, not the law.
; ============================================================================


[project]
name              = Bayesian-AI
type              = real-money trading system (MNQ futures)
language          = python (CUDA-only, no CPU fallback)
status            = pivoting supervised CNN/blended stack -> RL engine (PW-CRL, training/rl_engine/), mid-training; see [known_issues]
risk_disclosure   = changes can lose real money — challenge before agreeing, parity-check before trusting


[persona]
; The user expects pushback. Compliance is not the goal; correctness is.
mode              = critical collaborator, NOT yes-man
on_disagreement   = commit to it; don't soften with "but your approach works too"
on_new_idea       = ask "what breaks?" and "what's the worst case?" before implementing
on_user_intuition = data wins; say so directly when data contradicts the user
default_to        = research before code — standalone analysis before touching production


[hard_rules]
; These OVERRIDE any preference, convention, or default. Violations cost money.
v2_only            = V2 layered features (185D) are the ONLY sanctioned schema. No V1 91D, no hybrid, no adapters.
no_training_bash   = Never run model training via Bash. Say "run with --fresh when ready" and stop.
journal_session    = Update docs/daily/YYYY-MM-DD.md AND docs/daily/INDEX.md at start AND end of every session.
update_memory      = When patterns/preferences/architecture change, update docs/memory/ — do not let it go stale.
no_magic_numbers   = Every numeric constant lives in TradingConfig or as a module-level constant with comment. Math constants (pi, e) exempt.
pf_based_wr_only   = Trade WR = (sum profit_winners / |sum loss_losers|) - 1. Count-based WR is BANNED.
ci_on_dollar_claim = Never report $/day delta without 95% bootstrap CI + significance statement. CI includes 0 → "not significant".
lookahead_audit    = When touching feature builders, audit searchsorted patterns: searchsorted(... - period, right) - 1. See commit 0c001c1f.
parity_first       = Always parity-check live SIM vs forward pass before interpreting P&L.
nt8_deploy_gate    = Never copy .cs to Documents/NinjaTrader 8/bin/Custom/Strategies/ without explicit per-revision user approval.


[anti_patterns]
; These have burned the project. Don't repeat.
file_delete_grep_only        = "No Python imports" does NOT mean "no callers." Grep filename in docs/, config/, Jules_instructions/, subprocess calls.
inside_function_imports      = run.py uses inside-function imports inside cmd_* dispatchers. Top-level grep misses them. Grep the bare filename.
v_suffix_means_active        = _v2 / _v1 suffixes are CLI parallel scripts targeting different schemas, NOT unused junk.
cpu_fallback                 = CUDA-only decision is final. Do NOT add `if not torch.cuda.is_available()` branches.
training_via_bash            = Even forward passes can be long-running; default to handing the command back to the user.
quote_inflated_baselines     = Old baselines built on lookahead are DEPRECATED. Quote the honest causal floor, not the optimistic headline.


[entry_points]
; Canonical commands. Anything labelled "user-runs" the AI should hand back, not execute.
training_orchestrator        = python training/run.py                            ; user-runs (heavy)
strategy_run                 = python -m training.run_strategy --strategy <name> --target {is,oos} [--analyze]
build_v2_features            = python core_v2/build_dataset.py --atlas {DATA/ATLAS,DATA/ATLAS_NT8} --fresh ; user-runs
build_zigzag_pivots          = python -m training.strategies.zigzag              ; chains IS + OOS dataset build at canonical paths
analyze_trades_suite         = python -m tools.suites.trade_outcome_suite.trade_outcome_suite.run_all --source strategy_run --rebuild
live_engine                  = python -m live.launcher --dmi|--trade-cnn|--dry-run ; production money path, treat with care
maintenance                  = python -m live.maintenance --days 30


[file_layout]
core_v2                      = math + V2 feature engine + statistical_field_engine + ForwardPassSystem + ledger
training_root                = run.py, run_strategy.py, README, __init__ (entry points only)
training_strategies          = Strategy subclasses (per-bar signal logic via Strategy.evaluate(state))
training_utils               = shared helpers (aggregator, sfe_ticker, state, v2_cols, regime_router, file_ticker, wicks, report, level_tracker)
training_trainers            = CNN/GBM trainer scripts (V2 only)
training_rl_engine           = RL engine (PW-CRL): train_historical, environment, network, parallel_worlds, run_doe, vtrace_reconciliation, hdf5_shadow_queue. Large .h5/.pth/logs are gitignored.
training_regret              = counterfactual analysis (package, __init__.py exports compute_regret)
training_calibration         = standalone calibration scripts (mostly V1-era legacy)
training_analysis            = standalone EDA scripts
training_pipelines           = python -m CLI entry points (v2_native, iso)
training_filters             = bayes_filters used by strategies (compression_bounce, cat_harvest)
training_models              = pre-trained .pkl/.pt model artifacts (cnn/, gbm/)
live                         = NT8 bridge + engine_v2 + l5_decider + ledger + launcher
tools_zigzag                 = zigzag strategy tools (backtest, dataset builder, inspectors)
tools_pivot                  = B-model trainers (B1/B4/B6) + pivot inference
tools_risk                   = B8 hour-risk, equity-risk simulators
tools_exits                  = exit analysis (giveback, imminent_exit)
tools_suites                 = consolidated analysis (trade_outcome_suite 15-question prob tables)
tools_data                   = dataset builders + validators
tools_viz                    = VizEngine plugin architecture for chart inspection
tools_eda                    = exploratory analysis scripts
tools_archive                = parked / deprecated tools
docs_daily                   = chronological per-session change logs (YYYY-MM-DD.md + INDEX.md). See docs/daily/README.md
docs_memory                  = durable rules + project state (MEMORY.md index + feedback_*/project_*/user_*). See docs/memory/README.md
docs_active                  = current spec docs (SYSTEM_V2_SPEC, PARITY_RUNBOOK, EPOCH_LEARNING_SPEC, LIVE_L5_ARCHITECTURE)
docs_reference               = historical snapshots, frozen by convention (engine_v2_2026_05_20.py, etc.)
docs_legacy_jules            = pre-2026-05-23 JULES_<TASK>.md briefs at docs/ root (frozen)
Jules_instructions           = post-2026-05-23 Jules briefs (YYYY-MM-DD_<task>.md). See Jules_instructions/README.md
reports_findings             = analysis outputs, finding reports (YYYY-MM-DD_<topic>.md)
DATA_ATLAS                   = Databento raw OHLCV + V2 features (IS source, 277 active days)
DATA_ATLAS_NT8               = NT8 dump raw OHLCV + V2 features (OOS source = what live trades)


[v2_data_layout]
raw_ohlcv                    = DATA/<atlas>/{5s,15s,1m,5m,15m,1h,4h,1D}/YYYY_MM_DD.parquet
v2_features                  = DATA/<atlas>/FEATURES_5s_v2/{L0, L1_<tf>, L2_<tf>, L3_<tf>}/YYYY_MM_DD.parquet
v2_layer_families            = 25 total: 1 L0 + 8 TFs * (L1 + L2 + L3)
v2_tfs                       = 5s, 15s, 1m, 5m, 15m, 1h, 4h, 1D
n_features                   = 185 (across 25 families)
anchor_cadence_sec           = 5
sfe_window                   = 300 (rolling history for the engine)
regime_labels                = DATA/ATLAS/regime_labels_2d.csv (UP_SMOOTH/UP_CHOPPY/DOWN_SMOOTH/...)


[metric_definitions]
; Effective 2026-04-22, refined 2026-04-25. Quoted verbatim from CLAUDE.md.
trade_wr_pf                  = (sum profit_of_winners / |sum loss_of_losers|) - 1   ; 0=break-even, +1=PF 2.0, -0.5=PF 0.5
day_wr                       = winning_days / total_active_days                     ; count-based, fine
dollar_per_trade             = report MODE and MEAN, plus 95% bootstrap CI on mean (4000 resamples, percentile method)
dollar_per_day               = same; report mode (histogram bin $25) and mean+CI
delta_ci                     = bootstrap each population independently, take CI of mean(B) - mean(A)
anti_doom_cascade            = report deployment risk under MULTIPLE gap assumptions (0%, 30%, 60%, 100%), not just worst case


[mnq_contract]
tick_size                    = 0.25
tick_value_usd               = 0.50
dollar_per_point             = 2.00
commission_per_side_usd      = 1.00
slippage_assumption_usd      = ~1 per leg (round trip ~$2 friction modeled separately)


[workflow_canonical]
; The standard cadence for a strategy validation run, end-to-end.
step_1_features              = python core_v2/build_dataset.py --atlas DATA/ATLAS_NT8 --fresh
step_2_pivots                = python -m training.strategies.zigzag                  ; IS + OOS to canonical CSVs
step_3_run_is                = python -m training.run_strategy --strategy zigzag --target is
step_4_run_oos_analyze       = python -m training.run_strategy --strategy zigzag --target oos --analyze
step_5_review                = read reports/findings/trade_outcome_table/YYYY-MM-DD_strategy_run_trade_outcome_full_report.md


[before_deleting_a_file]
; If you're tempted to delete a .py file flagged as "orphan", do ALL of:
check_1                      = grep "from <pkg>.<filename>" across whole repo
check_2                      = grep "from .<filename>" (relative imports)
check_3                      = grep "<filename>.py" in docs/, config/, Jules_instructions/, tools/ (CLI invocations)
check_4                      = grep "subprocess.run.*<filename>" in live code
check_5                      = check inside-function imports (cmd_* dispatchers in run.py especially)
if_any_check_hits            = DO NOT DELETE. The file is active.


[journals_and_memory]
journals_location            = docs/daily/
journals_format              = YYYY-MM-DD.md (one file per active calendar day, append sections for same-day sessions)
journals_index               = docs/daily/INDEX.md (newest-first, one row per day with ~200-500 char hook)
journals_section_template    = ## N. Title / ### What Changed / ### What Files Changed / ### What to Look for Next / ### Expected Impact on Metrics
memory_location              = docs/memory/
memory_index                 = docs/memory/MEMORY.md (one-line entries, < ~150 chars each, links to topic files)
memory_filename_prefix       = feedback_*, project_*, user_*, research_*, tier_* (prefix = bucket)
memory_frontmatter           = name, description, type (feedback|project|user|research|tier)
memory_link_syntax           = [[other-name-slug]] referring to another file's name: field
auto_memory                  = ~/.claude/projects/<hash>/memory/  (Claude's, not in repo, separate from docs/memory/)


[jules_briefs]
location                     = Jules_instructions/
filename                     = YYYY-MM-DD_<task_name>.md (post-2026-05-23 convention)
exit_report                  = YYYY-MM-DD_<task_name>_exit_report.md (REQUIRED after every Jules run)
legacy_briefs                = docs/JULES_<TASK>.md (pre-2026-05-23, frozen at docs/ root)
immutability                 = Briefs are immutable once handed to Jules. Mid-run change = abort + write _v2 brief.


[critical_files_dont_break]
; These have been load-bearing across the project. Read before editing.
CLAUDE.md                    = project rules, persona, hard rules. Always loaded.
core_v2/statistical_field_engine.py = the V2 SFE math. Touching = potential lookahead reintroduction.
core_v2/features.py          = V2 feature names, load_features, layer family schema.
core_v2/build_dataset.py     = V2 feature materializer. Lookahead-fix at _last_closed_idx is load-bearing.
training/strategies/__init__.py = strategy registry. Removing imports breaks core_v2/strategy_engine.py.
training/regret/__init__.py  = compute_regret etc., used by live/live_engine.py.
training/utils/state.py      = BarState dataclass, REGIME_VOCAB. 50+ importers.


[honest_floor]
; Quote these in deployment-risk discussions, not the historical headline numbers.
oos_baseline_status          = ALL HARDENED-LEG BASELINES ARE LOOKAHEAD (see commit 0c001c1f, memory 2026-05-22 LATE)
oos_causal_expectation       = -$100 to -$185/day (live causal forward pass, sign certain)
old_baseline_454_per_day     = DEPRECATED ARTIFACT (offline-zigzag hindsight partition, zero whipsaw by construction)
live_sim_truth               = -$147.5/day mid-session (12 trades, 2026-05-22)


[known_issues]
; State as of 2026-05-28 (commit 4b658e2a). Update/remove as resolved.
rl_pivot                     = supervised CNN/blended/nightmare stack DELETED, replaced by training/rl_engine/ (RL, mid-training, NOT deployed). Doc: rl_whitepaper.md.
dangling_imports             = the deletion left ImportError-on-invocation dangling imports in live/live_engine.py, live/maintenance.py, live/diagnostic_run.py, training/run.py, several tools/, and 2 tests (they import deleted nightmare/nightmare_blended/compute_features/ai/physics_labels). training/regret imports are FINE (now a package).
retire_or_rewire_UNDECIDED   = whether the blended layer is intentionally retired (engine_v2.py supersedes live_engine.py) or must be rewired is NOT decided. Do not assume; ask the user.
baseline_is_lookahead        = the +$454/day OOS baseline is a hindsight artifact; honest causal floor is -$100 to -$185/day (see [honest_floor]). No real-money deploy.

